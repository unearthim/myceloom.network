<svg width="100%" height="100%" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <!--
      Variant: Ember / No Trunk / Crown Arc
      Intent: Preserve exact 8-node crown arc spacing from asym-8 variant,
              remove trunk and roots, apply current protocol + ember palette.
      Palette: #0A0E1B, #1D2434, #E2E8F0, #22D3EE, #FF8A00
    -->

    <style>
        @keyframes pulseCore {
            0% { r: 148; }
            50% { r: 160; }
            100% { r: 148; }
        }

        @keyframes driftA {
            0% { transform: translate(0px, 0px); }
            50% { transform: translate(5px, -10px); }
            100% { transform: translate(0px, 0px); }
        }

        @keyframes driftB {
            0% { transform: translate(0px, 0px); }
            50% { transform: translate(-6px, -8px); }
            100% { transform: translate(0px, 0px); }
        }

        @keyframes driftC {
            0% { transform: translate(0px, 0px); }
            50% { transform: translate(4px, 6px); }
            100% { transform: translate(0px, 0px); }
        }

        .core { animation: pulseCore 4.8s ease-in-out infinite; }
        .node-a { animation: driftA 6.2s ease-in-out infinite; }
        .node-b { animation: driftB 7.1s ease-in-out infinite; }
        .node-c { animation: driftC 8.0s ease-in-out infinite; }
    </style>

    <rect width="1024" height="1024" fill="#0A0E1B" />

    <defs>
        <filter id="glow-cyan" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="7" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glow-ember" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <g transform="translate(512, 512)">
        <g stroke="#E2E8F0" stroke-width="7" fill="none" opacity="0.92">
            <line x1="0" y1="0" x2="-286" y2="0" />
            <line x1="0" y1="0" x2="-258" y2="-124" />
            <line x1="0" y1="0" x2="-178" y2="-224" />
            <line x1="0" y1="0" x2="-64" y2="-279" />
            <line x1="0" y1="0" x2="64" y2="-279" />
            <line x1="0" y1="0" x2="178" y2="-224" />
            <line x1="0" y1="0" x2="258" y2="-124" />
            <line x1="0" y1="0" x2="286" y2="0" />
        </g>

        <g stroke="#E2E8F0" stroke-width="8" filter="url(#glow-ember)">
            <g class="node-a">
                <circle cx="-286" cy="0" r="26" fill="#FF8A00" />
                <circle cx="-64" cy="-279" r="23" fill="#FF8A00" />
                <circle cx="178" cy="-224" r="24" fill="#FF8A00" />
            </g>
            <g class="node-b">
                <circle cx="-258" cy="-124" r="24" fill="#FF8A00" />
                <circle cx="64" cy="-279" r="26" fill="#FF8A00" />
                <circle cx="258" cy="-124" r="25" fill="#FF8A00" />
            </g>
            <g class="node-c">
                <circle cx="-178" cy="-224" r="25" fill="#FF8A00" />
                <circle cx="286" cy="0" r="27" fill="#FF8A00" />
            </g>
        </g>

        <circle class="core" cx="0" cy="0" r="154" fill="#1D2434" stroke="#E2E8F0" stroke-width="10" />
        <circle cx="0" cy="0" r="58" fill="#0A0E1B" stroke="#22D3EE" stroke-width="6" />

        <circle cx="0" cy="0" r="338" fill="none" stroke="#22D3EE" stroke-opacity="0.16" stroke-width="2" stroke-dasharray="8 16" />
    </g>
</svg>
